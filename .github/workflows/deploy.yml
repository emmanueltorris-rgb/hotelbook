name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Trigger Render deployment
        run: |
          echo "Triggering Render deployment for both frontend and backend..."
          curl --fail-with-body -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
        shell: bash
      
      - name: Wait for deployment to start
        run: |
          echo "Deployment hook triggered. Render will now build and deploy your application."
          sleep 5
      
      - name: Deployment status
        run: |
          echo "✓ Deployment request sent successfully!"
          echo "✓ Check your Render dashboard at https://dashboard.render.com/ for build progress"
