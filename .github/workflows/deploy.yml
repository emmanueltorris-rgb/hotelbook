name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render deployment
        run: |
          echo "Triggering Render deployment for hotelbook..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
